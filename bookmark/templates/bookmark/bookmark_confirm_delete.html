{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
    <form action="" method="post">
        {% csrf_token %}    <!-- 외부사이트 해킹 방어, 로그인한 사용자의 권한으로, ※Form 테그 안에는 항상 있어야함 -->
        <div class = "alert alert-danger">Do you want delete Bookmark "{{ object }}"?</div>
        <input type="submit" value="Delete" class="btn btn-danger">
    </form>
{% endblock %}

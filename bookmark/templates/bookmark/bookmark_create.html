{% extends 'base.html' %}

{% block title %}Bookmark Add{% endblock %}

{% block content %}
    <form action="" method="post">
        {% csrf_token %}  <!-- 외부사이트 해킹 방어, 로그인한 사용자의 권한으로 -->
        {{form.as_p}}       <!-- 클래스형 뷰의 옵션 값으로 설정한 필드 출력, p태그로 감싸서 출력 -->
        <input type="submit" value="Add" class="btn btn-info btn-sm">
    </form>
{% endblock %}
